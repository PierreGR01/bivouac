<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>* { box-sizing: border-box; }</style>
</helmet>
<div style="width:100%;min-height:100%;display:flex;align-items:center;justify-content:center;background:#F1F2F4;padding:80px;">
  <div style="position:relative;display:flex;flex-direction:column;align-items:center;">
    <div style="position:relative;z-index:2;width:{{ screenW }}px;background:#F1F2F4;border:1.5px solid #C2C6CC;border-radius:22px;padding:{{ bezel }}px;">
      <div style="border-radius:6px;overflow:hidden;border:1px solid #D4D7DC;background:#FFFFFF;line-height:0;">
        <img src="uploads/pasted-1782485163071-0.png" alt="screenshot" style="display:block;width:100%;height:auto;" />
      </div>
    </div>
    <div style="position:relative;z-index:1;margin-top:-1.5px;width:{{ baseW }}px;height:26px;background:#F1F2F4;border:1.5px solid #C2C6CC;border-top:none;border-radius:0 0 14px 14px;display:flex;align-items:flex-start;justify-content:center;">
      <div style="width:{{ notchW }}px;height:11px;background:#F1F2F4;border:1.5px solid #C2C6CC;border-top:none;border-radius:0 0 9px 9px;"></div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1400,&quot;height&quot;:920},&quot;screenW&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:1120,&quot;min&quot;:600,&quot;max&quot;:1600,&quot;tsType&quot;:&quot;number&quot;},&quot;bezel&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:18,&quot;min&quot;:6,&quot;max&quot;:48,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const screenW = this.props.screenW ?? 1120;
    const bezel = this.props.bezel ?? 18;
    return { screenW, bezel, baseW: Math.round(screenW * 1.07), notchW: Math.round(screenW * 0.13) };
  }
}
</script>
</body>
</html>
